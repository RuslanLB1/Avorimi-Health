{{define "register.html"}}{{template "header" .}}

<section class="container section narrow">
  <h1>Регистрация</h1>
  <p class="muted">Аккаунт нужен, чтобы записываться на приём, оплачивать визиты и пользоваться подпиской.</p>

  {{if .Error}}<p class="error">{{.Error}}</p>{{end}}

  <form method="post" action="/register" class="form">
    <label>ФИО
      <input type="text" name="full_name" required placeholder="Иванов Иван Иванович">
    </label>
    <label>ИИН
      <input type="text" name="iin" required pattern="\d{12}" maxlength="12" placeholder="12 цифр">
    </label>
    <label>Телефон
      <input type="tel" name="phone" required placeholder="+7 700 000 00 00">
    </label>
    <label>Пароль
      <input type="password" name="password" required minlength="6" placeholder="Не короче 6 символов">
    </label>
    <label>Повторите пароль
      <input type="password" name="confirm_password" required minlength="6">
    </label>
    <button type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
  </form>

  <p class="muted center" style="margin-top:16px;">Уже есть аккаунт? <a href="/login">Войти</a></p>
</section>

{{template "footer" .}}{{end}}
