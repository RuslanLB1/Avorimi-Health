{{define "register.html"}}{{template "header" .}}

<section class="container section narrow">
  <h1>{{t .Lang "register.title"}}</h1>
  <p class="muted">{{t .Lang "register.intro"}}</p>

  {{if .Error}}<p class="error">{{t .Lang .Error}}</p>{{end}}

  <form method="post" action="/register" class="form">
    <label>{{t .Lang "register.fullName"}}
      <input type="text" name="full_name" required placeholder="Иванов Иван Иванович">
    </label>
    <label>{{t .Lang "register.iin"}}
      <input type="text" name="iin" required pattern="\d{12}" maxlength="12" placeholder="12 цифр">
    </label>
    <p class="muted small notice">{{t .Lang "register.idNotice"}}</p>
    <label>{{t .Lang "register.phone"}}
      <div class="phone-input">
        <span class="phone-prefix">+7</span>
        <input type="tel" name="phone_local" required inputmode="numeric" pattern="[\d\s]{10,14}" maxlength="14" placeholder="701 234 56 78">
      </div>
    </label>
    <label>{{t .Lang "register.password"}}
      <input type="password" name="password" required minlength="6" placeholder="{{t .Lang "register.notShorter"}}">
    </label>
    <label>{{t .Lang "register.confirmPassword"}}
      <input type="password" name="confirm_password" required minlength="6">
    </label>

    <div class="consent-box">
      <div class="consent-row">
        <input type="checkbox" id="accept_terms" name="accept_terms" required>
        <label for="accept_terms">{{t .Lang "register.acceptTermsPre"}} <a href="/terms" target="_blank">{{t .Lang "register.termsLink"}}</a> {{t .Lang "register.and"}} <a href="/privacy" target="_blank">{{t .Lang "register.privacyLink"}}</a></label>
      </div>
      <div class="consent-row">
        <input type="checkbox" id="accept_pdn" name="accept_pdn" required>
        <label for="accept_pdn">{{t .Lang "register.acceptPdn"}}</label>
      </div>
    </div>

    <button type="submit" class="btn btn-primary btn-block">{{t .Lang "register.submit"}}</button>
  </form>

  <p class="muted center" style="margin-top:16px;">{{t .Lang "register.haveAccount"}} <a href="/login">{{t .Lang "register.loginLink"}}</a></p>
</section>

{{template "footer" .}}{{end}}
