{{define "login.html"}}{{template "header" .}}

<section class="container section narrow">
  <h1>{{t .Lang "login.title"}}</h1>

  {{if .Error}}<p class="error">{{t .Lang .Error}}</p>{{end}}

  <form method="post" action="/login" class="form">
    <input type="hidden" name="next" value="{{.Next}}">
    <label>{{t .Lang "login.phone"}}
      <div class="phone-input">
        <span class="phone-prefix">+7</span>
        <input type="tel" name="phone_local" required inputmode="numeric" pattern="[\d\s]{10,14}" maxlength="14" placeholder="701 234 56 78">
      </div>
    </label>
    <label>{{t .Lang "login.password"}}
      <input type="password" name="password" required>
    </label>
    <button type="submit" class="btn btn-primary btn-block">{{t .Lang "login.submit"}}</button>
  </form>

  <p class="muted center" style="margin-top:16px;">{{t .Lang "login.noAccount"}} <a href="/register">{{t .Lang "login.registerLink"}}</a></p>
</section>

{{template "footer" .}}{{end}}
