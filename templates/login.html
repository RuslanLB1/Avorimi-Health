{{define "login.html"}}{{template "header" .}}

<section class="container section narrow">
  <h1>Вход</h1>

  {{if .Error}}<p class="error">{{.Error}}</p>{{end}}

  <form method="post" action="/login" class="form">
    <input type="hidden" name="next" value="{{.Next}}">
    <label>Телефон
      <div class="phone-input">
        <span class="phone-prefix">+7</span>
        <input type="tel" name="phone_local" required inputmode="numeric" pattern="[\d\s]{10,14}" maxlength="14" placeholder="701 234 56 78">
      </div>
    </label>
    <label>Пароль
      <input type="password" name="password" required>
    </label>
    <button type="submit" class="btn btn-primary btn-block">Войти</button>
  </form>

  <p class="muted center" style="margin-top:16px;">Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
</section>

{{template "footer" .}}{{end}}
